<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zap TMS Invites</title>
  <link rel="stylesheet" href="styles.css?v=6500">
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="section-title">
        <h1>Invite Users</h1>
        <p class="muted">Only invited emails can create and use their own Zap TMS account.</p>
      </div>
      <p id="who" class="muted">Checking session...</p>
      <div id="inviteBox" style="display:none">
        <label>Email to invite
          <input id="inviteEmail" placeholder="dispatcher@email.com">
        </label>
        <button id="addInviteBtn" class="primary-btn">Add Invite</button>
        <p class="muted">The dispatcher must create their account with this exact email. Their data stays separate from yours.</p>
        <div id="inviteList" class="card" style="margin-top:14px"></div>
      </div>
      <p><a href="/">Back to TMS</a></p>
    </section>
  </main>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (async()=>{
    const OWNER='rolando@zapdispatch.com';
    const by=id=>document.getElementById(id);
    const sb=supabase.createClient(ZAP_TMS_CONFIG.url,ZAP_TMS_CONFIG.token,{auth:{persistSession:true,autoRefreshToken:true}});
    const session=(await sb.auth.getSession()).data.session;
    const user=session&&session.user;
    if(!user){by('who').innerHTML='You are not logged in. <a href="/">Login first</a>, then come back to this page.';return}
    const email=String(user.email||'').toLowerCase();
    by('who').textContent='Logged in as: '+email;
    if(email!==OWNER){by('who').textContent='Access denied. Only the Zap Dispatch owner can invite users.';return}
    by('inviteBox').style.display='block';
    async function toggleInvite(em,active){
      if(active&&!confirm('Turn off access for '+em+'? They will not be able to log in until turned back on.'))return;
      const r=await sb.from('app_invites').update({active:!active}).eq('email',em);
      if(r.error){alert(r.error.message);return}
      list();
    }
    async function list(){
      const r=await sb.from('app_invites').select('email,active,created_at,note').order('created_at',{ascending:false});
      if(r.error){by('inviteList').textContent=r.error.message;return}
      by('inviteList').innerHTML='<h3>Invited Emails</h3>'+((r.data||[]).map(x=>'<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid var(--line);padding:8px 0"><b>'+x.email+'</b><span style="display:flex;align-items:center;gap:8px">'+(x.active?'Active':'Off')+(x.email===OWNER?'':'<button type="button" class="small-btn invite-toggle" data-email="'+x.email+'" data-active="'+(x.active?1:0)+'">'+(x.active?'Turn off':'Turn on')+'</button>')+'</span></div>').join('')||'<p class="muted">No invites yet.</p>');
      by('inviteList').querySelectorAll('.invite-toggle').forEach(b=>b.onclick=()=>toggleInvite(b.dataset.email,b.dataset.active==='1'));
    }
    by('addInviteBtn').onclick=async()=>{
      const e=(by('inviteEmail').value||'').trim().toLowerCase();
      if(!e||!e.includes('@')){alert('Enter a valid email.');return}
      const r=await sb.from('app_invites').upsert({email:e,active:true,invited_by:user.id,note:'beta tester'},{onConflict:'email'});
      if(r.error){alert(r.error.message);return}
      by('inviteEmail').value='';
      alert('Invite added: '+e);
      list();
    };
    list();
  })();
  </script>
</body>
</html>
