<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Metallic gradients -->
    <linearGradient id="metalBronze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9e4b7;stop-opacity:1" />
      <stop offset="15%" style="stop-color:#f2cf68;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#d6a62b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#b89623;stop-opacity:1" />
      <stop offset="85%" style="stop-color:#8a6f15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a4a0a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="bronzeShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a4a0a;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#f9e4b7;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#f2cf68;stop-opacity:0.6" />
      <stop offset="80%" style="stop-color:#f9e4b7;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#5a4a0a;stop-opacity:0" />
    </linearGradient>

    <radialGradient id="innerGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#f9e4b7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#5a4a0a;stop-opacity:0" />
    </radialGradient>

    <!-- Filters for depth -->
    <filter id="deepShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="coloredBlur"/>
      <feFlood in="coloredBlur" flood-color="#000" flood-opacity="0.3" result="offsetblur"/>
      <feComposite in="offsetblur" in2="SourceGraphic" operator="in" result="offsetblur"/>
      <feComposite in="offsetblur" in2="SourceGraphic" operator="in" result="offsetblur"/>
    </filter>

    <style>
      .seal-ring { fill: none; stroke: url(#metalBronze); stroke-linecap: round; stroke-linejoin: round; }
      .seal-text-main { font-family: 'Arial Black', sans-serif; font-weight: 900; font-style: italic; fill: url(#metalBronze); }
      .seal-text-sub { font-family: 'Arial Black', sans-serif; font-weight: 800; letter-spacing: 2px; fill: url(#metalBronze); }
    </style>
  </defs>

  <!-- Outer ring (main seal border) - thick metallic band -->
  <circle cx="150" cy="150" r="138" class="seal-ring" stroke-width="5" filter="url(#deepShadow)"/>

  <!-- Shine on outer ring -->
  <circle cx="150" cy="150" r="138" class="seal-ring" stroke="url(#bronzeShine)" stroke-width="4" opacity="0.6"/>

  <!-- Second ring (inner accent) -->
  <circle cx="150" cy="150" r="128" class="seal-ring" stroke-width="1.5" opacity="0.7"/>

  <!-- Top curved metallic arc (3D effect) -->
  <path d="M 55 150 Q 55 75, 150 60 Q 245 75, 245 150"
        class="seal-ring" stroke-width="4" fill="none"
        filter="url(#deepShadow)" opacity="0.95"/>

  <!-- Top arc shine/highlight -->
  <path d="M 55 150 Q 55 75, 150 60 Q 245 75, 245 150"
        class="seal-ring" stroke="url(#bronzeShine)" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Bottom curved metallic arc (3D effect) -->
  <path d="M 55 150 Q 55 225, 150 240 Q 245 225, 245 150"
        class="seal-ring" stroke-width="4" fill="none"
        filter="url(#deepShadow)" opacity="0.95"/>

  <!-- Bottom arc shine/highlight -->
  <path d="M 55 150 Q 55 225, 150 240 Q 245 225, 245 150"
        class="seal-ring" stroke="url(#bronzeShine)" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Center divider line -->
  <line x1="70" y1="150" x2="230" y2="150"
        stroke="url(#metalBronze)" stroke-width="2" opacity="0.6" filter="url(#deepShadow)"/>

  <!-- Inner glow effect -->
  <circle cx="150" cy="150" r="130" fill="url(#innerGlow)" opacity="0.4"/>

  <!-- Main ZAP text (large, italic, bold) -->
  <text x="150" y="175" class="seal-text-main" font-size="110" text-anchor="middle"
        letter-spacing="-4" filter="url(#deepShadow)">ZAP</text>

  <!-- DISPATCH text (top) -->
  <text x="150" y="105" class="seal-text-sub" font-size="18" text-anchor="middle"
        letter-spacing="2.5" filter="url(#deepShadow)">DISPATCH</text>

  <!-- TMS text (bottom) -->
  <text x="150" y="225" class="seal-text-sub" font-size="14" text-anchor="middle"
        letter-spacing="2" filter="url(#deepShadow)" opacity="0.9">TMS</text>

  <!-- Left accent wings -->
  <g filter="url(#deepShadow)" opacity="0.8">
    <line x1="25" y1="150" x2="55" y2="150" stroke="url(#metalBronze)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="25,150 20,145 20,155" fill="url(#metalBronze)"/>
  </g>

  <!-- Right accent wings -->
  <g filter="url(#deepShadow)" opacity="0.8">
    <line x1="245" y1="150" x2="275" y2="150" stroke="url(#metalBronze)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="275,150 280,145 280,155" fill="url(#metalBronze)"/>
  </g>

  <!-- Top decorative accent marks -->
  <g opacity="0.7" filter="url(#deepShadow)">
    <circle cx="140" cy="60" r="2.5" fill="url(#metalBronze)"/>
    <circle cx="160" cy="60" r="2.5" fill="url(#metalBronze)"/>
  </g>

  <!-- Bottom decorative accent marks -->
  <g opacity="0.7" filter="url(#deepShadow)">
    <circle cx="140" cy="240" r="2.5" fill="url(#metalBronze)"/>
    <circle cx="160" cy="240" r="2.5" fill="url(#metalBronze)"/>
  </g>
</svg>