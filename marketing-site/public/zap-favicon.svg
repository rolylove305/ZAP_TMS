<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f2cf68;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d6a62b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a67d1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circle seal -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#favGold)" stroke-width="3"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#d6a62b" stroke-width="1" opacity="0.5"/>

  <!-- Large centered Z -->
  <text x="100" y="125" font-family="'Arial Black', sans-serif" font-size="85" font-weight="900" font-style="italic" text-anchor="middle" fill="url(#favGold)" letter-spacing="-3">Z</text>

  <!-- Accent lines -->
  <line x1="30" y1="100" x2="50" y2="100" stroke="#d6a62b" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="100" x2="170" y2="100" stroke="#d6a62b" stroke-width="2" opacity="0.6"/>
</svg>