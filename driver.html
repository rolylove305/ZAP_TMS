<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Zap Dispatch Driver Portal</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{min-height:100vh;padding:18px;display:flex;justify-content:center;align-items:flex-start}
    .driver-shell{width:min(760px,100%);padding:24px 0 90px}
    .driver-logo{display:block;width:250px;max-width:82vw;margin:0 auto 18px}
    .driver-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px;margin:14px 0;box-shadow:var(--shadow)}
    .driver-route{font-size:26px;line-height:1.2;margin:8px 0 12px;font-weight:900}
    .driver-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.driver-grid div{background:var(--card2);border-radius:16px;padding:14px;border:1px solid var(--line)}
    .driver-actions{display:grid;gap:12px;margin-top:16px}.driver-actions button{font-size:16px;padding:16px}
    input[type=file]{width:100%;padding:14px;border-radius:14px;border:1px solid var(--line);background:var(--card2);color:var(--text)}
    @media(max-width:640px){.driver-grid{grid-template-columns:1fr}.driver-route{font-size:22px}.driver-shell{padding-top:8px}}
  </style>
</head>
<body>
  <div class="driver-shell">
    <img class="driver-logo" src="zap-logo-dark.png" alt="Zap Dispatch">
    <div class="driver-card">
      <p class="eyebrow">Driver Portal</p>
      <h1>Load Details</h1>
      <p id="driverMsg" class="muted">Loading load...</p>
      <div id="loadBox" class="hidden">
        <div class="driver-route"><span id="pickupText"></span> → <span id="deliveryText"></span></div>
        <div class="pill-row"><span class="pill" id="statusText"></span><span class="pill" id="equipmentText"></span><span class="pill" id="loadNumberText"></span></div>
        <div class="driver-grid">
          <div><p class="muted">Pickup date</p><h3 id="pickupDateText">-</h3></div>
          <div><p class="muted">Delivery date</p><h3 id="deliveryDateText">-</h3></div>
        </div>
        <div class="driver-card" style="box-shadow:none;margin-bottom:0"><p class="muted">Notes</p><p id="notesText">-</p></div>
        <div class="driver-actions">
          <button class="primary-btn" id="pickedBtn">Mark Picked Up + Send Location</button>
          <button class="primary-btn" id="deliveredBtn">Mark Delivered + Send Location</button>
        </div>
      </div>
    </div>
    <div class="driver-card">
      <h2>Upload BOL / POD</h2>
      <p class="muted">Upload a photo or PDF after pickup or delivery.</p>
      <input id="docFile" type="file" accept="image/*,.pdf" />
      <button class="primary-btn" id="uploadBtn" style="margin-top:12px">Upload document</button>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="driver-test.js"></script>
</body>
</html>
